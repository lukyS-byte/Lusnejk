<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snake 🐍</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#ff6eb4;
  --pink2:#ffb3e0;
  --bg:#0d0d1a;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  font-family:'Outfit',sans-serif;
  overflow:hidden;
  position:fixed;
}
body::before{
  content:'';position:fixed;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(255,110,180,0.1) 0%,transparent 70%);
  top:-150px;left:-100px;
  pointer-events:none;
}
body::after{
  content:'';position:fixed;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(255,179,224,0.07) 0%,transparent 70%);
  bottom:-100px;right:-50px;
  pointer-events:none;
}
.app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  padding:12px 14px;
  gap:10px;
  position:relative;
  z-index:1;
}
.header{display:flex;justify-content:space-between;align-items:center;}
.logo{
  font-size:1.5rem;font-weight:900;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
}
.btns{display:flex;gap:8px;}
.ibtn{
  width:38px;height:38px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:white;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.scores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sc{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:8px;text-align:center;
}
.sc .lbl{font-size:0.5rem;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sc .val{font-size:1.2rem;font-weight:700;color:white;}
.sc.hi .val{background:linear-gradient(90deg,var(--pink),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.game-wrap{
  flex:1;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.5);
  min-height:0;
}
canvas{width:100%;height:100%;display:block;}
.overlay{
  position:absolute;inset:0;
  background:rgba(10,10,20,0.93);
  backdrop-filter:blur(20px);
  border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:20px;
}
.ov-emoji{font-size:3rem;animation:bob 1s ease-in-out infinite alternate;}
@keyframes bob{0%{transform:translateY(0);}100%{transform:translateY(-8px);}}
.ov-title{font-size:1.7rem;font-weight:900;color:white;letter-spacing:-0.5px;}
.ov-sub{font-size:0.8rem;color:rgba(255,255,255,0.35);text-align:center;line-height:1.7;}
.ov-score{
  font-size:2.6rem;font-weight:900;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.ov-stats{display:flex;gap:16px;margin:2px 0;}
.ov-stat{text-align:center;}
.ov-stat span:first-child{display:block;font-size:0.5rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;}
.ov-stat span:last-child{font-size:1rem;font-weight:700;color:white;}
.pbtn{
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  border:none;border-radius:18px;
  color:#1a0010;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:700;
  padding:13px 40px;cursor:pointer;
  box-shadow:0 6px 24px rgba(255,110,180,0.35);
  transition:transform 0.1s;margin-top:4px;
}
.pbtn:active{transform:scale(0.95);}
/* Touch zone */
#tzone{
  position:relative;
  width:100%;height:160px;
  flex-shrink:0;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
}
.tz-arrow{
  position:absolute;
  color:rgba(255,255,255,0.2);
  font-size:1.4rem;
  pointer-events:none;
  transition:color 0.1s, text-shadow 0.1s;
  z-index:2;
}
#tz-up{top:8px;left:50%;transform:translateX(-50%);}
#tz-down{bottom:8px;left:50%;transform:translateX(-50%);}
#tz-left{left:10px;top:50%;transform:translateY(-50%);}
#tz-right{right:10px;top:50%;transform:translateY(-50%);}
.tz-hint{
  position:absolute;bottom:6px;width:100%;
  text-align:center;font-size:0.5rem;
  color:rgba(255,255,255,0.12);pointer-events:none;
  letter-spacing:0.5px;
}
#tzone.flash-up #tz-up,
#tzone.flash-down #tz-down,
#tzone.flash-left #tz-left,
#tzone.flash-right #tz-right{
  color:var(--pink);
  text-shadow:0 0 12px var(--pink);
}

/* Leaderboard */
.lb{
  position:fixed;inset:0;
  background:rgba(10,10,20,0.97);
  backdrop-filter:blur(30px);
  z-index:100;
  display:none;flex-direction:column;
  padding:20px 18px;gap:14px;
  overflow-y:auto;
}
.lb.open{display:flex;}
.lb-hd{display:flex;justify-content:space-between;align-items:center;}
.lb-ttl{
  font-size:1.3rem;font-weight:900;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.lb-list{display:flex;flex-direction:column;gap:8px;}
.lb-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:11px 14px;
}
.lb-row.g{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.06);}
.lb-rk{font-size:1rem;font-weight:900;color:rgba(255,255,255,0.25);width:26px;text-align:center;flex-shrink:0;}
.lb-row.g .lb-rk{color:#ffd700;}
.lb-nm{flex:1;font-size:0.9rem;font-weight:600;color:white;}
.lb-sc{
  font-size:0.95rem;font-weight:700;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.lb-empty{color:rgba(255,255,255,0.25);font-size:0.85rem;text-align:center;margin-top:40px;}

/* Name dialog */
.nd{
  position:fixed;inset:0;
  background:rgba(10,10,20,0.97);
  backdrop-filter:blur(30px);
  z-index:200;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;padding:24px;
}
.nd.open{display:flex;}
.nd h2{font-size:1.5rem;font-weight:900;color:white;}
.nd p{font-size:0.8rem;color:rgba(255,255,255,0.35);text-align:center;line-height:1.6;}
.ni{
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,110,180,0.4);
  border-radius:14px;color:white;
  font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:600;
  padding:13px 18px;width:100%;max-width:260px;
  text-align:center;outline:none;
}
.ni:focus{border-color:rgba(255,110,180,0.9);}
.lb-change{
  background:transparent;border:none;
  color:rgba(255,255,255,0.25);font-family:'Outfit',sans-serif;
  font-size:0.75rem;cursor:pointer;padding:4px 8px;
  text-decoration:underline;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🐍 Snake</div>
    <div class="btns">
      <button class="ibtn" onclick="openLB()">🏆</button>
      <button class="ibtn" id="pBtn" onclick="togglePause()">⏸</button>
    </div>
  </div>
  <div class="scores">
    <div class="sc hi"><div class="lbl">Skóre</div><div class="val" id="sc">0</div></div>
    <div class="sc"><div class="lbl">Rekord</div><div class="val" id="hi">0</div></div>
    <div class="sc"><div class="lbl">Level</div><div class="val" id="lv">1</div></div>
  </div>
  <div class="game-wrap" id="gw">
    <canvas id="c"></canvas>
    <div class="overlay" id="ov">
      <div class="ov-emoji">🐍</div>
      <div class="ov-title">Snake</div>
      <div class="ov-sub">Seber co nejvíc jídla<br>a nepřejeď přes sebe!</div>
      <button class="pbtn" onclick="startGame()">Hrát →</button>
    </div>
  </div>
  <!-- Touch control zone -->
  <div id="tzone">
    <div class="tz-arrow" id="tz-up">↑</div>
    <div class="tz-arrow" id="tz-left">←</div>
    <div class="tz-arrow" id="tz-right">→</div>
    <div class="tz-arrow" id="tz-down">↓</div>
    <div class="tz-hint">Klikni nebo přejeď prstem</div>
  </div>
</div>

<!-- Leaderboard -->
<div class="lb" id="lb">
  <div class="lb-hd">
    <div class="lb-ttl">🏆 Žebříček</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="lb-change" onclick="changeName()">✏️ Změnit jméno</button>
      <button class="ibtn" onclick="closeLB()">✕</button>
    </div>
  </div>
  <div class="lb-list" id="lbl"></div>
</div>

<!-- Name dialog -->
<div class="nd" id="nd">
  <div style="font-size:2.5rem">🐍</div>
  <h2>Jak se jmenuješ?</h2>
  <p>Jméno se uloží a<br>nebudeš ho zadávat znovu</p>
  <input class="ni" id="ni" type="text" maxlength="16" placeholder="Tvoje jméno" autocomplete="off">
  <button class="pbtn" onclick="submitName()">Uložit →</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const gw = document.getElementById('gw');
const ov = document.getElementById('ov');

const GRID = 20;
let W, H, CELL;

function resize() {
  const r = gw.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = r.width; H = r.height;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CELL = Math.floor(Math.min(W, H) / GRID);
}

resize();
window.addEventListener('resize', resize);

let snake, dir, nd, food, bonus, score, hi = 0, level;
let paused = false, running = false;
let prog = 0, lastT = 0, raf = null, bonTmr = null;

function spd() { return Math.max(65, 160 - (level-1)*15); }

function startGame() {
  resize();
  const cx = Math.floor(W/CELL/2), cy = Math.floor(H/CELL/2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nd = {x:1,y:0};
  score = 0; level = 1; paused = false; running = true;
  bonus = null; prog = 0; lastT = performance.now();
  ov.style.display = 'none';
  document.getElementById('pBtn').textContent = '⏸';
  updUI(); spawnFood();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function loop(now) {
  if (!running) return;
  if (!paused) {
    const dt = Math.min(now - lastT, 100);
    prog += dt / spd();
    lastT = now;
    if (prog >= 1) { prog -= 1; tick(); }
    if (running) draw(prog);
  } else { lastT = now; }
  raf = requestAnimationFrame(loop);
}

function spawnFood() {
  const cols = Math.floor(W/CELL), rows = Math.floor(H/CELL);
  let p;
  do { p = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p;
}

function spawnBonus() {
  if (bonus) return;
  const cols = Math.floor(W/CELL), rows = Math.floor(H/CELL);
  let p;
  do { p = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y)||(food.x===p.x&&food.y===p.y));
  bonus = p;
  bonTmr = setTimeout(()=>{bonus=null;}, 5000);
}

function tick() {
  if (!running) return;
  dir = nd;
  const cols = Math.floor(W/CELL), rows = Math.floor(H/CELL);
  const h = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (h.x<0||h.x>=cols||h.y<0||h.y>=rows) return die();
  if (snake.some(s=>s.x===h.x&&s.y===h.y)) return die();
  snake.unshift(h);
  if (h.x===food.x&&h.y===food.y) {
    score += 10*level;
    if (score>hi) hi=score;
    level = Math.floor(score/100)+1;
    updUI(); spawnFood();
    if (score%50===0) spawnBonus();
  } else if (bonus&&h.x===bonus.x&&h.y===bonus.y) {
    score += 50*level;
    if (score>hi) hi=score;
    clearTimeout(bonTmr); bonus=null; updUI();
  } else { snake.pop(); }
}

function draw(t) {
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  const cols=Math.floor(W/CELL),rows=Math.floor(H/CELL);
  for(let x=0;x<=cols;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke();}
  for(let y=0;y<=rows;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke();}

  // food
  const fg=ctx.createRadialGradient(food.x*CELL+CELL/2,food.y*CELL+CELL/2,0,food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL);
  fg.addColorStop(0,'#ff4d6d');fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;ctx.fillRect(food.x*CELL-CELL/2,food.y*CELL-CELL/2,CELL*2,CELL*2);
  ctx.shadowBlur=14;ctx.shadowColor='#ff4d6d';ctx.fillStyle='#ff4d6d';
  const fp=Math.round(CELL*0.14);
  rr(food.x*CELL+fp,food.y*CELL+fp,CELL-fp*2,CELL-fp*2,6);
  ctx.shadowBlur=0;

  // bonus
  if(bonus){
    const p=0.8+0.2*Math.sin(Date.now()/150);
    ctx.shadowBlur=18*p;ctx.shadowColor='#ffd700';
    ctx.font=`${Math.round(CELL*0.75)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⭐',bonus.x*CELL+CELL/2,bonus.y*CELL+CELL/2);
    ctx.shadowBlur=0;
  }

  // snake
  snake.forEach((seg,i)=>{
    const head=i===0, ratio=i/snake.length;
    let dx=seg.x*CELL, dy=seg.y*CELL;
    if(head&&snake.length>1){
      const pv=snake[1];
      dx=(pv.x+(seg.x-pv.x)*t)*CELL; dy=(pv.y+(seg.y-pv.y)*t)*CELL;
    } else if(i===1&&snake.length>2){
      const pv=snake[2];
      dx=(pv.x+(seg.x-pv.x)*t)*CELL; dy=(pv.y+(seg.y-pv.y)*t)*CELL;
    }
    // PINK snake
    const r=Math.round(255);
    const g=Math.round(110-ratio*40);
    const b=Math.round(180-ratio*50);
    ctx.fillStyle=head?`rgb(255,110,180)`:`rgba(${r},${g},${b},${1-ratio*0.45})`;
    ctx.shadowBlur=head?16:6;
    ctx.shadowColor=head?'rgba(255,110,180,0.8)':'rgba(220,80,150,0.3)';
    const p=head?1:Math.round(CELL*0.09+ratio*2);
    rr(dx+p,dy+p,CELL-p*2,CELL-p*2,head?8:5);
    ctx.shadowBlur=0;
    if(head){
      ctx.fillStyle='#1a0010';
      const es=Math.round(CELL*0.14),eo=Math.round(CELL*0.24);
      if(dir.x===1){ctx.fillRect(dx+CELL-eo-es,dy+eo,es,es);ctx.fillRect(dx+CELL-eo-es,dy+CELL-eo-es,es,es);}
      else if(dir.x===-1){ctx.fillRect(dx+eo,dy+eo,es,es);ctx.fillRect(dx+eo,dy+CELL-eo-es,es,es);}
      else if(dir.y===-1){ctx.fillRect(dx+eo,dy+eo,es,es);ctx.fillRect(dx+CELL-eo-es,dy+eo,es,es);}
      else{ctx.fillRect(dx+eo,dy+CELL-eo-es,es,es);ctx.fillRect(dx+CELL-eo-es,dy+CELL-eo-es,es,es);}
    }
  });
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}

function die(){
  running=false;
  if(raf) cancelAnimationFrame(raf);
  const rec=score===hi&&score>0;
  ov.innerHTML=`
    <div class="ov-emoji">${rec?'🏆':'💀'}</div>
    <div class="ov-title">${rec?'Rekord!':'Game Over'}</div>
    <div class="ov-score">${score}</div>
    <div class="ov-stats">
      <div class="ov-stat"><span>délka</span><span>${snake.length}</span></div>
      <div class="ov-stat"><span>level</span><span>${level}</span></div>
      <div class="ov-stat"><span>rekord</span><span>${hi}</span></div>
    </div>
    <button class="pbtn" onclick="startGame()">Hrát znovu →</button>
  `;
  ov.style.display='flex';
  if(score>0) setTimeout(()=>handleScoreSubmit(score),700);
}

function updUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=hi;
  document.getElementById('lv').textContent=level;
}

function togglePause(){
  if(!running) return;
  paused=!paused;
  document.getElementById('pBtn').textContent=paused?'▶':'⏸';
}

function mv(x,y){
  if(!running||paused) return;
  if(x!==-dir.x||y!==-dir.y) nd={x,y};
}

// keyboard
document.addEventListener('keydown',e=>{
  if(!running) return;
  if(e.code==='Space'){togglePause();e.preventDefault();return;}
  const m={ArrowUp:{x:0,y:-1},KeyW:{x:0,y:-1},ArrowDown:{x:0,y:1},KeyS:{x:0,y:1},ArrowLeft:{x:-1,y:0},KeyA:{x:-1,y:0},ArrowRight:{x:1,y:0},KeyD:{x:1,y:0}};
  const move=m[e.code];
  if(move&&(move.x!==-dir.x||move.y!==-dir.y)){nd=move;e.preventDefault();}
});

// ── TOUCH ZONE ──────────────────────────────────────
const tzone = document.getElementById('tzone');
let tzStartX=0, tzStartY=0, tzMoved=false;

function flashDir(d){
  tzone.className='';
  tzone.classList.add('flash-'+d);
  setTimeout(()=>tzone.classList.remove('flash-'+d),180);
}

function dirFromZone(ex, ey){
  const r = tzone.getBoundingClientRect();
  const x = ex - r.left - r.width/2;
  const y = ey - r.top - r.height/2;
  if(Math.abs(x) > Math.abs(y)) return x>0?{x:1,y:0,d:'right'}:{x:-1,y:0,d:'left'};
  return y>0?{x:0,y:1,d:'down'}:{x:0,y:-1,d:'up'};
}

tzone.addEventListener('touchstart', e=>{
  e.preventDefault();
  tzStartX = e.touches[0].clientX;
  tzStartY = e.touches[0].clientY;
  tzMoved = false;
}, {passive:false});

tzone.addEventListener('touchmove', e=>{
  e.preventDefault();
  const dx = e.touches[0].clientX - tzStartX;
  const dy = e.touches[0].clientY - tzStartY;
  if(Math.abs(dx)<12 && Math.abs(dy)<12) return;
  tzMoved = true;
  const m = Math.abs(dx)>Math.abs(dy)?(dx>0?{x:1,y:0,d:'right'}:{x:-1,y:0,d:'left'}):(dy>0?{x:0,y:1,d:'down'}:{x:0,y:-1,d:'up'});
  mv(m.x, m.y);
  flashDir(m.d);
  tzStartX = e.touches[0].clientX;
  tzStartY = e.touches[0].clientY;
}, {passive:false});

tzone.addEventListener('touchend', e=>{
  e.preventDefault();
  if(!tzMoved){
    // tap – use position in zone
    const t = e.changedTouches[0];
    const m = dirFromZone(t.clientX, t.clientY);
    mv(m.x, m.y);
    flashDir(m.d);
  }
}, {passive:false});

// mouse fallback
tzone.addEventListener('mousedown', e=>{
  const m = dirFromZone(e.clientX, e.clientY);
  mv(m.x, m.y);
  flashDir(m.d);
});

// ── LEADERBOARD (jsonbin.io) ──
const BIN_ID = '69a806e2d0ea881f40eda832';
const API_KEY = '$2a$10$VupJYoKcGX3FUJypPtJZUek2wTcgU.GXs0..fOWBZcrM5ZdmjRMMi';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
let myName = localStorage.getItem('snakeName') || '';

async function getLB(){
  try {
    const res = await fetch(BIN_URL+'/latest', {headers:{'X-Master-Key':API_KEY}});
    const data = await res.json();
    const scores = data.record?.scores || [];
    // Jen nejlepší skóre každého hráče
    const best = {};
    scores.forEach(e => {
      if(!best[e.name] || e.score > best[e.name].score) best[e.name] = e;
    });
    return Object.values(best).sort((a,b)=>b.score-a.score).slice(0,20);
  } catch(e) { console.log('getLB error',e); return []; }
}

async function addScore(name, score){
  try {
    const scores = await getLB();
    scores.push({name, score, date:Date.now()});
    scores.sort((a,b)=>b.score-a.score);
    const res = await fetch(BIN_URL, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify({scores:scores.slice(0,50)})
    });
    console.log('save status:', res.status);
  } catch(e) { console.log('addScore error', e); }
}

async function openLB(){
  document.getElementById('lb').classList.add('open');
  const el = document.getElementById('lbl');
  el.innerHTML = '<div class="lb-empty">Načítám...</div>';
  const a = await getLB();
  if(!a.length){ el.innerHTML='<div class="lb-empty">Zatím žádné skóre 🐍<br>Buď první!</div>'; return; }
  el.innerHTML = a.map((e,i)=>`<div class="lb-row ${i===0?'g':''}">
    <div class="lb-rk">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
    <div class="lb-nm">${e.name}${e.name===myName?' 👈':''}</div>
    <div class="lb-sc">${e.score}</div>
  </div>`).join('');
}

function closeLB(){ document.getElementById('lb').classList.remove('open'); }

function showND(){
  document.getElementById('ni').value = myName;
  document.getElementById('nd').classList.add('open');
  setTimeout(()=>document.getElementById('ni').focus(),300);
}

function changeName(){ closeLB(); showND(); }

function submitName(){
  const name = document.getElementById('ni').value.trim();
  if(!name) return;
  myName = name;
  localStorage.setItem('snakeName', myName);
  document.getElementById('nd').classList.remove('open');
  document.getElementById('ni').value='';
}

document.getElementById('ni').addEventListener('keydown',e=>{ if(e.key==='Enter') submitName(); });

if(!myName) showND();

async function handleScoreSubmit(score){
  if(!myName){
    showND();
    await new Promise(resolve=>{
      const orig = window.submitName;
      window.submitName = function(){
        const name = document.getElementById('ni').value.trim();
        if(!name) return;
        myName = name;
        localStorage.setItem('snakeName', myName);
        document.getElementById('nd').classList.remove('open');
        document.getElementById('ni').value='';
        resolve();
      };
    });
  }
  await addScore(myName, score);
  openLB();
}
</script>
